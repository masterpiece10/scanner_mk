services:
  backend:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin

  configurator:
    image: frappe/erpnext:v16.16.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs

  create-site:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    volumes:
      - .sites:/home/frappe/frappe-bench/sites
      - .logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=admin --db-root-username=root --db-root-password=admin --install-app erpnext --install-app erpnext_scanner_mk --set-default frontend;

  db:
    image: mariadb:11.8
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - /home/masterpiece/docker/erp/.db-data:/var/lib/mysql

  frontend:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    depends_on:
      - websocket
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: tnlui.tik13.org
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs
    ports:
      - "8888:8080"

  queue-long:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - /home/masterpiece/docker/erp/.redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure

  scheduler:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - schedule
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs

  websocket:
    image: erpnext-v16-ocr:latest
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites
      - /home/masterpiece/docker/erp/.logs:/home/frappe/frappe-bench/logs

  tunnel:
    container_name: tunnel
    image: cloudflare/cloudflared:latest
    networks: 
      - frappe_network
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiYjczMGUwNDJmNzBmYTRjNGViMmRjOGRiMGE4ODM0MmIiLCJ0IjoiYzlmNDE5M2QtNGNjYi00YzkzLTk0ZDAtOGEzYjE5ZDFlZTZlIiwicyI6Ik16RTJNR1ZrTlRJdFlUZ3lOeTAwT1RVeUxXSmlOR1l0WWpCaE1EbGxaakJoT0RCbCJ9

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge

# Integrate erpnext_scanner_mk app
apps:
  erpnext_scanner_mk:
    image: erpnext_scanner_mk:latest
    volumes:
      - /home/masterpiece/docker/erp/.sites:/home/frappe/frappe-bench/sites